name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggera su tag che iniziano con v (es. v1.0.0)

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          cd ByteOrBite
          npm install

      - name: Build Ionic App
        run: |
          cd ByteOrBite
          npm run build

      - name: Sync Capacitor
        run: |
          cd ByteOrBite
          npx cap sync android

      - name: Build Android APK
        run: |
          cd ByteOrBite/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ByteOrBite/android/app/build/outputs/apk/debug/app-debug.apk

  build-electron:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          cd ByteOrBite
          npm install
          cd electron
          npm install

      - name: Build Ionic App
        run: |
          cd ByteOrBite
          npm run build

      - name: Build Electron EXE
        run: |
          cd ByteOrBite/electron
          npm run electron:make

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-setup
          path: ByteOrBite/electron/dist/*.exe

  create-release:
    needs: [build-android, build-electron]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: electron-setup

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app-debug.apk
            *.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
