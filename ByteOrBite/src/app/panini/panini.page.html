<ion-content class="ion-padding">
  <!-- Rimosso il secondo ion-title fuori da un'header per buona pratica, ma puoi rimetterlo se serve -->
  <h1 class="ion-padding-start">Catalogo Panini</h1>

  <ion-grid fixed>
    <ion-row>
      <!-- La formattazione dei dispositivi viene scritta UNA SOLA VOLTA qui -->
      <ion-col size="4" size-md="3" size-lg="2" *ngFor="let panino of panini">
        <ion-card>
          <img [src]="getImageUrl(panino.immagine_url)" [alt]="panino.nome">
          <ion-card-header>
            <ion-card-title>{{ panino.nome }}</ion-card-title>
            <ion-card-subtitle>{{ panino.prezzo | currency:'EUR' }}</ion-card-subtitle>
          </ion-card-header>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
